name: Awqat Salah City Discovery

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  awqat-salah-city-discovery:
    runs-on: ubuntu-latest
    env:
      AWQAT_SALAH_USERNAME: ${{ secrets.AWQAT_SALAH_USERNAME }}
      AWQAT_SALAH_PASSWORD: ${{ secrets.AWQAT_SALAH_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Awqat Salah city discovery
        run: node --experimental-strip-types scripts/prayerTimes/findAwqatSalahCity.ts
